# Honcho Configuration - Self-hosted with MiniMax LLM backend

[app]
LOG_LEVEL = "INFO"
SESSION_OBSERVERS_LIMIT = 10
GET_CONTEXT_MAX_TOKENS = 8000
MAX_FILE_SIZE = 5242880
MAX_MESSAGE_SIZE = 25000
EMBED_MESSAGES = true
NAMESPACE = "honcho"

[db]
CONNECTION_URI = "postgresql+psycopg://honcho:honcho123@honcho-postgres:5432/honcho"
SCHEMA = "public"
POOL_PRE_PING = true
POOL_SIZE = 5
MAX_OVERFLOW = 10

[auth]
USE_AUTH = false

[llm]
DEFAULT_MAX_TOKENS = 4096
MAX_TOOL_OUTPUT_CHARS = 10000
MAX_MESSAGE_CONTENT_CHARS = 2000
OPENAI_API_KEY = "sk-cp--MLzXyf5V50vO5wkchRazhzGF-dULvbTikU7ojyjzo2H17L5b-h2DXj-2I6xmuvMVpsnshNlGUoi83dABbVg6fczYBdBW4WYRghWdwp5lgfTCw5x8PjT51M"

[embedding]
VECTOR_DIMENSIONS = 1024

[embedding.model_config]
transport = "openai"
model = "BAAI/bge-large-zh-v1.5"

[embedding.model_config.overrides]
base_url = "https://api.siliconflow.cn/v1"
api_key = "sk-yofeaabmuumckiomjqbgipouhfdusorieruhmaaxroxgzxjs"

[deriver]
ENABLED = true
WORKERS = 1
POLLING_SLEEP_INTERVAL_SECONDS = 1.0
STALE_SESSION_TIMEOUT_MINUTES = 5
DEDUPLICATE = true
FLUSH_ENABLED = true
REPRESENTATION_BATCH_MAX_TOKENS = 128

[deriver.model_config]
transport = "openai"
model = "glm-5.1"

[deriver.model_config.overrides]
base_url = "https://ark.cn-beijing.volces.com/api/coding/v3"
